[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-os"
version = "0.1.0"
description = "Local-first controller for an AI-assisted workspace."
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "rich>=13.0.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
security = [
    "pip-audit>=2.6.0",
    "safety>=2.3.0",
    "bandit[toml]>=1.7.5",
    "cyclonedx-bom>=3.11.0",
]

[project.scripts]
workspace = "workspace_os.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
workspace_os = ["web_assets/*.html", "web_assets/*.css", "web_assets/*.js"]

[tool.bandit]
exclude_dirs = ["tests/", ".venv/", "build/", ".claude/"]
skips = ["B101"]
