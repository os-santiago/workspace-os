[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-os"
version = "0.1.0"
description = "Local-first controller for an AI-assisted workspace."
requires-python = ">=3.11"
readme = "README.md"

[project.scripts]
workspace = "workspace_os.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
