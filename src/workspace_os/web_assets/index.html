<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workspace OS</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="title-bar">
      <div class="brand">Workspace OS</div>
      <div class="title-status" id="titleStatus">Loading workspace</div>
    </header>

    <main class="shell">
      <section class="start-panel">
        <p class="section-label">Start here</p>
        <h1>Choose one action.</h1>
        <p class="intro">The pilot now starts with the three actions that matter most: check the workspace, find existing knowledge, or prepare context for an agent.</p>

        <div class="action-grid" aria-label="Primary actions">
          <button class="action-button" type="button" data-action="validate">
            <span>1</span>
            Validate workspace
          </button>
          <button class="action-button" type="button" data-action="search">
            <span>2</span>
            Search knowledge
          </button>
          <button class="action-button" type="button" data-action="context">
            <span>3</span>
            Build agent context
          </button>
        </div>

        <form class="command-line" id="workspaceForm">
          <label for="workspaceInput" id="inputLabel">Search term</label>
          <input id="workspaceInput" name="value" value="ADEV" autocomplete="off">
          <button type="submit" id="runButton">Run</button>
        </form>
      </section>

      <aside class="state-panel" aria-label="Workspace state">
        <p class="section-label">Workspace state</p>
        <div class="state-number">
          <strong id="sourceCount">--</strong>
          <span>sources</span>
        </div>
        <div class="state-line" id="governanceState">Governance: loading</div>
        <div class="source-list" id="sourceList"></div>
      </aside>

      <section class="output-panel">
        <div class="output-header">
          <span id="outputTitle">Result</span>
          <span id="activeAction">validate</span>
        </div>
        <pre class="terminal" id="mainOutput">Loading...</pre>
      </section>

      <details class="advanced-panel">
        <summary>Roadmap progress</summary>
        <pre class="terminal compact" id="roadmapOutput"></pre>
      </details>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
