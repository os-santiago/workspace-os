<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workspace OS</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">Workspace OS</div>
      <div class="engine-indicators" aria-label="Engine indicators">
        <span class="engine-pill" id="conscienceIndicator">Conscience 0</span>
        <span class="engine-pill" id="learningIndicator">Learning 0</span>
      </div>
    </header>

    <main class="workspace-layout">
      <section class="chat-panel" aria-label="Workspace chat">
        <div class="chat-stream" id="chatStream">
          <article class="message system-message">
            <strong>Workspace OS</strong>
            <p>Send a request. The Operational Conscience Layer evaluates it, the learning engine checks for reusable knowledge, and Workspace OS prepares the next action.</p>
          </article>
        </div>
        <form class="chat-composer" id="chatForm">
          <textarea id="chatInput" name="message" rows="3" placeholder="Ask, plan, delegate, or capture a lesson..."></textarea>
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="right-rail" aria-label="Workspace activity">
        <section class="rail-section">
          <div class="rail-header">
            <h2>Software</h2>
            <span>Recent 10</span>
          </div>
          <div class="rail-list" id="softwareList"></div>
        </section>

        <section class="rail-section">
          <div class="rail-header">
            <h2>Docs</h2>
            <span>Recent 10</span>
          </div>
          <div class="rail-list" id="docsList"></div>
        </section>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
